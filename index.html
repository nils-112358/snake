<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futuristisches Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        
        /* Futuristischer Hintergrund-Effekt */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
        }
        
        .glow-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite alternate;
        }
        
        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            margin: 0 auto;
        }
        
        .game-header {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 20, 30, 0.8);
            padding: 12px 15px;
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            margin-bottom: 0;
        }
        
        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 20px;
            background: rgba(0, 40, 60, 0.6);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }
        
        .score-label {
            font-size: 0.8rem;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .score-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #0ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            font-family: 'Courier New', monospace;
        }
        
        #gameCanvas {
            display: block;
            background-color: rgba(0, 10, 20, 0.9);
            border-radius: 0 0 12px 12px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.1);
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
        }
        
        .touch-instructions {
            color: rgba(0, 255, 255, 0.7);
            font-size: 0.9rem;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            background: rgba(0, 30, 50, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            max-width: 400px;
            width: 100%;
        }
        
        .touch-instructions p {
            margin: 5px 0;
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0 0 12px 12px;
            z-index: 10;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        
        .game-over h2 {
            font-size: 2.8rem;
            color: #f0f;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
        }
        
        .final-score {
            font-size: 2rem;
            margin-bottom: 25px;
            color: #0ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            font-family: 'Courier New', monospace;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #0ff, #00aaff);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .restart-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0 0 12px 12px;
            z-index: 5;
            backdrop-filter: blur(3px);
        }
        
        .pause-text {
            font-size: 2.5rem;
            color: #0ff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .tap-to-continue {
            color: rgba(0, 255, 255, 0.7);
            font-size: 1rem;
            text-align: center;
        }
        
        @media (max-height: 700px) {
            .touch-instructions {
                display: none;
            }
            
            .game-header {
                padding: 8px 12px;
            }
            
            .score-value {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 480px) {
            .game-header {
                padding: 8px;
            }
            
            .score-box {
                padding: 6px 15px;
            }
            
            .score-value {
                font-size: 1.8rem;
            }
            
            .game-over h2 {
                font-size: 2.2rem;
            }
            
            .final-score {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Futuristischer Hintergrund -->
    <div class="bg-effects">
        <div class="grid-pattern"></div>
        <div class="glow-effect"></div>
    </div>
    
    <div class="container">
        <div class="game-container">
            <div class="game-header">
                <div class="score-box">
                    <div class="score-label">Punkte</div>
                    <div class="score-value" id="score">0</div>
                </div>
            </div>
            
            <canvas id="gameCanvas"></canvas>
            
            <div class="pause-overlay" id="pauseOverlay">
                <div class="pause-text">Pause</div>
                <div class="tap-to-continue">Tippe aufs Spielfeld um fortzufahren</div>
            </div>
            
            <div class="game-over" id="gameOverScreen">
                <h2>Game Over</h2>
                <div class="final-score" id="finalScore">Punkte: 0</div>
                <button class="restart-btn" id="restartGameBtn">Neustart</button>
            </div>
        </div>
        
        <div class="touch-instructions">
            <p>Wische zum Steuern der Schlange</p>
            <p>Tippe doppelt für Pause</p>
        </div>
    </div>

    <script>
        // Game-Konstanten und Variablen
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const finalScoreElement = document.getElementById('finalScore');
        const restartGameBtn = document.getElementById('restartGameBtn');
        
        // Spielvariablen
        let gridSize = 20;
        let gridWidth, gridHeight;
        let snake = [];
        let foods = [];
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameSpeed = 120;
        let minGameSpeed = 80;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;
        let touchStartX = 0;
        let touchStartY = 0;
        let lastTapTime = 0;
        
        // Futuristische Farben
        const FRUIT_COLORS = [
            { main: '#FF00FF', glow: '#FF66FF' }, // Magenta
            { main: '#00FFFF', glow: '#66FFFF' }, // Cyan
            { main: '#00FF00', glow: '#66FF66' }, // Neon Grün
            { main: '#FFFF00', glow: '#FFFF66' }, // Gelb
            { main: '#FF9900', glow: '#FFCC66' }, // Orange
            { main: '#9900FF', glow: '#CC66FF' }, // Lila
            { main: '#00FF99', glow: '#66FFCC' }  // Türkis
        ];
        
        // Canvas-Größe initialisieren
        function initCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, 600);
            canvas.width = size;
            canvas.height = size;
            
            gridWidth = Math.floor(canvas.width / gridSize);
            gridHeight = Math.floor(canvas.height / gridSize);
        }
        
        // Spiel initialisieren
        function initGame() {
            // Schlange initialisieren
            snake = [
                {x: Math.floor(gridWidth / 2), y: Math.floor(gridHeight / 2)},
                {x: Math.floor(gridWidth / 2) - 1, y: Math.floor(gridHeight / 2)},
                {x: Math.floor(gridWidth / 2) - 2, y: Math.floor(gridHeight / 2)}
            ];
            
            // Richtung zurücksetzen
            direction = 'right';
            nextDirection = 'right';
            
            // Punktestand zurücksetzen
            score = 0;
            scoreElement.textContent = score;
            
            // Spielgeschwindigkeit zurücksetzen
            gameSpeed = 120;
            
            // Früchte initialisieren (5 Stück)
            foods = [];
            for (let i = 0; i < 5; i++) {
                placeNewFood();
            }
            
            // Spielstatus
            gameRunning = true;
            gamePaused = false;
            pauseOverlay.style.display = "none";
            gameOverScreen.style.display = "none";
            
            // Spiel-Loop starten
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(updateGame, gameSpeed);
            
            // Sofort zeichnen
            drawGame();
        }
        
        // Neue Frucht platzieren
        function placeNewFood() {
            let foodOnSnake, foodOnOtherFood;
            let newFood;
            
            do {
                foodOnSnake = false;
                foodOnOtherFood = false;
                
                newFood = {
                    x: Math.floor(Math.random() * gridWidth),
                    y: Math.floor(Math.random() * gridHeight),
                    colorIndex: Math.floor(Math.random() * FRUIT_COLORS.length),
                    pulse: Math.random() * Math.PI * 2 // Zufälliger Puls-Offset
                };
                
                // Prüfen, ob Frucht auf Schlange ist
                for (let segment of snake) {
                    if (segment.x === newFood.x && segment.y === newFood.y) {
                        foodOnSnake = true;
                        break;
                    }
                }
                
                // Prüfen, ob Frucht auf anderer Frucht ist
                if (!foodOnSnake) {
                    for (let existingFood of foods) {
                        if (existingFood.x === newFood.x && existingFood.y === newFood.y) {
                            foodOnOtherFood = true;
                            break;
                        }
                    }
                }
                
            } while (foodOnSnake || foodOnOtherFood);
            
            foods.push(newFood);
        }
        
        // Spiel aktualisieren
        function updateGame() {
            if (!gameRunning || gamePaused) return;
            
            direction = nextDirection;
            
            const head = {...snake[0]};
            
            switch (direction) {
                case 'up':
                    head.y -= 1;
                    break;
                case 'down':
                    head.y += 1;
                    break;
                case 'left':
                    head.x -= 1;
                    break;
                case 'right':
                    head.x += 1;
                    break;
            }
            
            // Kollision mit Wänden prüfen
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
                gameOver();
                return;
            }
            
            // Kollision mit eigenem Körper prüfen
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            // Neuen Kopf zur Schlange hinzufügen
            snake.unshift(head);
            
            // Prüfen, ob eine Frucht gefressen wurde
            let fruitEaten = false;
            for (let i = foods.length - 1; i >= 0; i--) {
                const food = foods[i];
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    scoreElement.textContent = score;
                    
                    foods.splice(i, 1);
                    placeNewFood();
                    
                    fruitEaten = true;
                    
                    if (gameSpeed > minGameSpeed) {
                        gameSpeed -= 1;
                        clearInterval(gameLoop);
                        gameLoop = setInterval(updateGame, gameSpeed);
                    }
                    
                    break;
                }
            }
            
            if (!fruitEaten) {
                snake.pop();
            }
            
            drawGame();
        }
        
        // Spiel zeichnen mit futuristischem Design
        function drawGame() {
            // Futuristischen Raster-Hintergrund zeichnen
            drawFuturisticBackground();
            
            // Schlange zeichnen mit futuristischem Effekt
            drawFuturisticSnake();
            
            // Früchte zeichnen mit Glow-Effekt
            drawFuturisticFoods();
        }
        
        // Futuristischer Hintergrund
        function drawFuturisticBackground() {
            // Dunkler Hintergrund
            ctx.fillStyle = 'rgba(0, 5, 15, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Feinmaschiges Raster
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 0.5;
            
            // Horizontale Linien
            for (let y = 0; y <= gridHeight; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * gridSize);
                ctx.lineTo(canvas.width, y * gridSize);
                ctx.stroke();
            }
            
            // Vertikale Linien
            for (let x = 0; x <= gridWidth; x++) {
                ctx.beginPath();
                ctx.moveTo(x * gridSize, 0);
                ctx.lineTo(x * gridSize, canvas.height);
                ctx.stroke();
            }
            
            // Glow-Punkte an den Gitter-Kreuzungen
            ctx.fillStyle = 'rgba(0, 255, 255, 0.05)';
            for (let x = 0; x <= gridWidth; x++) {
                for (let y = 0; y <= gridHeight; y++) {
                    ctx.beginPath();
                    ctx.arc(x * gridSize, y * gridSize, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // Futuristische Schlange zeichnen
        function drawFuturisticSnake() {
            const time = Date.now() * 0.01; // Für Animationseffekte
            
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const segmentTime = time - i * 0.3; // Wellen-Effekt entlang der Schlange
                
                // Farbverlauf von Cyan zu Magenta
                const progress = i / Math.max(snake.length - 1, 1);
                const hue = 180 + progress * 180; // 180° (Cyan) zu 360° (Magenta)
                const color = `hsl(${hue}, 100%, ${50 + Math.sin(segmentTime) * 10}%)`;
                
                // Glow-Effekt
                const glowRadius = gridSize * 0.7;
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    glowRadius
                );
                
                gradient.addColorStop(0, color);
                gradient.addColorStop(0.5, color.replace('100%', '70%').replace('50%', '40%'));
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * gridSize - glowRadius/2 + gridSize/2,
                    segment.y * gridSize - glowRadius/2 + gridSize/2,
                    glowRadius,
                    glowRadius
                );
                
                // Hauptsegment
                ctx.fillStyle = color;
                ctx.fillRect(
                    segment.x * gridSize + 2,
                    segment.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
                
                // Innere Glow
                ctx.fillStyle = i === 0 ? '#FFFFFF' : 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(
                    segment.x * gridSize + 4,
                    segment.y * gridSize + 4,
                    gridSize - 8,
                    gridSize - 8
                );
                
                // Segment-Rand
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(
                    segment.x * gridSize + 2,
                    segment.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
            }
            
            // Augen für den Kopf
            if (snake.length > 0) {
                const head = snake[0];
                ctx.fillStyle = '#FFFFFF';
                
                // Augen positionieren basierend auf Richtung
                let eyeOffsetX = 0, eyeOffsetY = 0;
                switch(direction) {
                    case 'right':
                        eyeOffsetX = 5;
                        eyeOffsetY = 0;
                        break;
                    case 'left':
                        eyeOffsetX = -5;
                        eyeOffsetY = 0;
                        break;
                    case 'up':
                        eyeOffsetX = 0;
                        eyeOffsetY = -5;
                        break;
                    case 'down':
                        eyeOffsetX = 0;
                        eyeOffsetY = 5;
                        break;
                }
                
                // Augen mit Glow
                const eyeGlow = ctx.createRadialGradient(
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 - 3,
                    0,
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 - 3,
                    8
                );
                eyeGlow.addColorStop(0, '#FFFFFF');
                eyeGlow.addColorStop(1, 'transparent');
                
                ctx.fillStyle = eyeGlow;
                ctx.beginPath();
                ctx.arc(
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 - 3,
                    8, 0, Math.PI * 2
                );
                ctx.fill();
                
                // Augäpfel
                ctx.fillStyle = '#00FFFF';
                ctx.beginPath();
                ctx.arc(
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 - 3,
                    3, 0, Math.PI * 2
                );
                ctx.fill();
                
                // Zweites Auge
                const eyeGlow2 = ctx.createRadialGradient(
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 + 3,
                    0,
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 + 3,
                    8
                );
                eyeGlow2.addColorStop(0, '#FFFFFF');
                eyeGlow2.addColorStop(1, 'transparent');
                
                ctx.fillStyle = eyeGlow2;
                ctx.beginPath();
                ctx.arc(
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 + 3,
                    8, 0, Math.PI * 2
                );
                ctx.fill();
                
                ctx.fillStyle = '#00FFFF';
                ctx.beginPath();
                ctx.arc(
                    head.x * gridSize + gridSize/2 + eyeOffsetX,
                    head.y * gridSize + gridSize/2 + 3,
                    3, 0, Math.PI * 2
                );
                ctx.fill();
            }
        }
        
        // Futuristische Früchte zeichnen
        function drawFuturisticFoods() {
            const time = Date.now() * 0.001;
            
            for (let food of foods) {
                const foodTime = time + food.pulse;
                const pulseSize = Math.sin(foodTime * 3) * 2 + 4;
                const pulseGlow = Math.sin(foodTime * 3) * 0.3 + 0.7;
                const color = FRUIT_COLORS[food.colorIndex];
                const centerX = food.x * gridSize + gridSize/2;
                const centerY = food.y * gridSize + gridSize/2;
                
                // Äußerer Glow
                const outerGlow = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, gridSize
                );
                outerGlow.addColorStop(0, color.main);
                outerGlow.addColorStop(0.5, color.main.replace(')', ', 0.3)'));
                outerGlow.addColorStop(1, 'transparent');
                
                ctx.fillStyle = outerGlow;
                ctx.beginPath();
                ctx.arc(centerX, centerY, gridSize, 0, Math.PI * 2);
                ctx.fill();
                
                // Mittlerer Glow
                const middleGlow = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, gridSize * 0.7
                );
                middleGlow.addColorStop(0, color.glow);
                middleGlow.addColorStop(1, 'transparent');
                
                ctx.fillStyle = middleGlow;
                ctx.beginPath();
                ctx.arc(centerX, centerY, gridSize * 0.7, 0, Math.PI * 2);
                ctx.fill();
                
                // Kern der Frucht
                ctx.fillStyle = color.main;
                ctx.beginPath();
                ctx.arc(centerX, centerY, gridSize/2 - pulseSize, 0, Math.PI * 2);
                ctx.fill();
                
                // Pulsierender innerer Kern
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // Datenpartikel um die Frucht
                ctx.fillStyle = color.glow;
                for (let i = 0; i < 8; i++) {
                    const angle = foodTime + i * Math.PI / 4;
                    const radius = gridSize/2 + Math.sin(foodTime * 5 + i) * 2;
                    const particleX = centerX + Math.cos(angle) * radius;
                    const particleY = centerY + Math.sin(angle) * radius;
                    
                    ctx.beginPath();
                    ctx.arc(particleX, particleY, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // Spielende
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            finalScoreElement.textContent = `Punkte: ${score}`;
            gameOverScreen.style.display = "flex";
        }
        
        // Touch-Steuerung
        function setupTouchControls() {
            let lastTouchTime = 0;
            
            // Wischsteuerung für die Schlange
            canvas.addEventListener('touchstart', (e) => {
                if (!gameRunning) return;
                
                e.preventDefault();
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTouchTime;
                
                // Doppeltipp für Pause
                if (tapLength < 300 && tapLength > 0) {
                    togglePause();
                    lastTouchTime = 0;
                    return;
                }
                
                lastTouchTime = currentTime;
                
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault(); // Verhindert Scrollen
            });
            
            canvas.addEventListener('touchend', (e) => {
                if (!gameRunning || gamePaused || !touchStartX || !touchStartY) return;
                
                e.preventDefault();
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                
                // Nur auf signifikante Bewegungen reagieren
                if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        // Horizontale Bewegung
                        if (dx > 0 && direction !== 'left') {
                            nextDirection = 'right';
                        } else if (dx < 0 && direction !== 'right') {
                            nextDirection = 'left';
                        }
                    } else {
                        // Vertikale Bewegung
                        if (dy > 0 && direction !== 'up') {
                            nextDirection = 'down';
                        } else if (dy < 0 && direction !== 'down') {
                            nextDirection = 'up';
                        }
                    }
                }
                
                touchStartX = 0;
                touchStartY = 0;
            });
            
            // Tippen auf Pause-Overlay um fortzufahren
            pauseOverlay.addEventListener('touchstart', (e) => {
                e.preventDefault();
                togglePause();
            });
        }
        
        // Pause umschalten
        function togglePause() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
            
            if (gamePaused) {
                pauseOverlay.style.display = "flex";
                clearInterval(gameLoop);
            } else {
                pauseOverlay.style.display = "none";
                gameLoop = setInterval(updateGame, gameSpeed);
            }
        }
        
        // Event-Listener initialisieren
        function initEventListeners() {
            restartGameBtn.addEventListener('click', initGame);
            setupTouchControls();
            
            window.addEventListener('resize', () => {
                initCanvas();
                if (gameRunning) drawGame();
            });
        }
        
        // Initialisierung, wenn die Seite geladen ist
        window.addEventListener('load', () => {
            initCanvas();
            initGame();
            initEventListeners();
        });
    </script>
</body>
</html>
